site:
  title: Gastown Self-Hosted Documentation
  url: https://docs.gastown.io
  start_page: gastown-self-hosted::index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs
      
ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

output:
  clean: true
  dir: build/site

asciidoc:
  attributes:
    page-pagination: true
    toc: left
    sectanchors: true

urls:
  html_extension_style: indexify
